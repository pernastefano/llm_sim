<!DOCTYPE html>
<html lang="en" data-i18n-title="viewer.title">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trace Viewer - LLM-sim</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/viewer.css" />
</head>
<body>

<header>
  <a class="logo" href="/">🧠 LLM-sim</a>
  <nav>
    <a href="/" data-i18n="nav.ask">Ask</a>
    <a href="/about" data-i18n="nav.howitworks">How it works</a>
    <a href="/trace" class="active" data-i18n="nav.traceviewer">Trace Viewer</a>
  </nav>
  <div class="lang-switcher">
    <button data-lang="en" data-i18n="lang.en">EN</button>
    <button data-lang="it" data-i18n="lang.it">IT</button>
  </div>
</header>

<main>
  <div id="trace-toolbar">
    <button id="auto-load-btn" data-i18n="viewer.btn.autoload">⚡ Auto-load llm_trace.json</button>
    <button id="expand-all-btn" data-i18n="viewer.btn.expandall" style="display:none">↕ Expand all</button>
  </div>

  <div id="filter-bar">
    <input type="text" id="filter-input" data-i18n-placeholder="viewer.filter.placeholder" />
    <span style="color:var(--muted);font-size:12px;" data-i18n="viewer.quickfilter">Quick filter:</span>
    <button class="filter-tag active" data-filter="" data-i18n="viewer.filter.all">All</button>
    <button class="filter-tag" data-filter="generation_step" data-i18n="viewer.filter.generation">generation</button>
    <button class="filter-tag" data-filter="agent" data-i18n="viewer.filter.agent">agent</button>
    <button class="filter-tag" data-filter="tokenization" data-i18n="viewer.filter.tokens">tokens</button>
  </div>

  <div id="summary" style="display:none"></div>
  <div id="trace-container">
    <div id="placeholder">
      <div class="big">📄</div>
      <h2 data-i18n="viewer.placeholder.title">No trace loaded</h2>
    </div>
  </div>
</main>

<footer>
  <span data-i18n="footer.copy">© 2026</span>
  <a href="https://www.stefanoperna.it" target="_blank" rel="noopener">Stefano Perna</a>
  <span class="footer-sep">·</span>
  <a href="https://github.com/pernastefano/llm_sim" target="_blank" rel="noopener" data-i18n="footer.github">GitHub</a>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/viewer.js"></script>
</body>
</html>
